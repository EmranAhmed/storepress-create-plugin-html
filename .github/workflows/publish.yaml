name: Publish to NPM

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - '**' # Push events to matching  i.e. 1.0, 20.15.10, including hierarchical tags like v1.0/beta
      # Semver (https://semver.org/) release pattern.
      # - '[0-9]+.[0-9]+.[0-9]+*'

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions: read-all

env:
  REPOSITORY_NAME: ${{ github.event.repository.name }}

jobs:
  # Publish release to NPM.
  # By Running
  #
  # git tag $(node -p "require('./package.json').version") && git push origin "$_"
  #
  # Performs the following steps:
  # - Checks out the repository.
  # - Set up NPM.
  # - Publish to NPM.

  # Step 1: Create the npm token

  # Go to https://www.npmjs.com/settings/YOUR_USERNAME/tokens
  # Generate New Token
  # Token Name
  # Bypass 2FA
  # Allowed IP ranges: leave empty
  # Permissions → Packages and scopes: change from "No access" to Read and write, scoped to just the package(s) you publish
  # Copy it (starts with npm_...)

  # Step 2: Add the token as a GitHub secret
  # In your repo: Settings → Secrets and variables → Actions → New repository secret

  # Name: NPM_TOKEN
  # Value: paste the token


  build:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: "Checks out the repository"
        uses: actions/checkout@v4

      - name: "Setup and Install Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: "Publish to NPM"
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
